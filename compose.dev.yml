version: '3.8'

services:
  app-server:
    # Alap beállítások
    build:
      context: .
    depends_on:
      - database
    # Dev beállítások
    ports:
      - "8888:80"
    volumes:
      - .:/var/www/html

  database:
    # Alap beállítások
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - db-data:/var/lib/mysql
      - ./app/database/database.sql:/docker-entrypoint-initdb.d/init.sql
    # Dev beállítások
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ecodrive
      MYSQL_USER: ecodrive
      MYSQL_PASSWORD: ecodrive2026

  phpmyadmin:
    # Alap beállítások
    image: phpmyadmin/phpmyadmin
    depends_on:
      - database
    environment:
      PMA_HOST: database
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
    # Dev beállítások
    ports:
      - "8080:80"

volumes:
  db-data:

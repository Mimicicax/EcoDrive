name: EcoDrive CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Continuous Integration - Testing
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ecodrive_test
          MYSQL_USER: ecodrive_test
          MYSQL_PASSWORD: ecodrive_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          extensions: mysqli, pdo_mysql
          coverage: xdebug
          tools: composer:v2

      - name: Validate composer.json and composer.lock
        run: composer validate --strict

      - name: Cache Composer packages
        id: composer-cache
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-suggest

      - name: Wait for MySQL
        run: |
          timeout 30 bash -c 'until mysqladmin ping -h 127.0.0.1 -P 3306 -u root -proot --silent; do sleep 1; done'

      - name: Setup test database
        run: |
          mysql -h 127.0.0.1 -P 3306 -u root -proot -e "CREATE DATABASE IF NOT EXISTS ecodrive_test;"
          mysql -h 127.0.0.1 -P 3306 -u root -proot -e "GRANT ALL PRIVILEGES ON ecodrive_test.* TO 'ecodrive_test'@'%';"
          mysql -h 127.0.0.1 -P 3306 -u root -proot -e "FLUSH PRIVILEGES;"

      - name: Run Unit Tests
        run: composer test:unit
        env:
          DB_HOST: 127.0.0.1
          DB_USER: ecodrive_test
          DB_PASSWORD: ecodrive_test
          DB_NAME: ecodrive_test
          DB_PORT: 3306

      - name: Run Integration Tests
        run: composer test:integration
        env:
          DB_HOST: 127.0.0.1
          DB_USER: ecodrive_test
          DB_PASSWORD: ecodrive_test
          DB_NAME: ecodrive_test
          DB_PORT: 3306

      - name: Generate test coverage report
        run: vendor/bin/phpunit --coverage-text --coverage-clover=coverage.xml
        env:
          DB_HOST: 127.0.0.1
          DB_USER: ecodrive_test
          DB_PASSWORD: ecodrive_test
          DB_NAME: ecodrive_test
          DB_PORT: 3306

      - name: Upload coverage to artifacts
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: coverage.xml

  # Code Quality Check
  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'

      - name: Check PHP syntax errors
        run: find . -name "*.php" -not -path "./vendor/*" -exec php -l {} \;

      - name: Count lines of code
        run: |
          echo "=== Code Statistics ==="
          echo "PHP files:"
          find app -name "*.php" | wc -l
          echo "Total lines in app:"
          find app -name "*.php" -exec wc -l {} + | tail -1

  # Security Scan
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Check for known security vulnerabilities
        run: |
          composer require --dev roave/security-advisories:dev-latest || echo "Security check completed"

  # Build validation
  build:
    name: Build Validation
    runs-on: ubuntu-latest
    needs: [test, code-quality]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          extensions: mysqli

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-dev --optimize-autoloader

      - name: Verify installation
        run: |
          echo "Build completed successfully"
          ls -la

      - name: Create deployment artifact
        run: |
          mkdir -p build
          rsync -av --exclude='tests' --exclude='.git' --exclude='node_modules' . build/
          tar -czf ecodrive-build-${{ github.sha }}.tar.gz -C build .

      - name: Upload build artifact
        uses: actions/upload-artifact@v3
        with:
          name: ecodrive-build
          path: ecodrive-build-${{ github.sha }}.tar.gz
          retention-days: 7

  # Continuous Deployment (csak main branch)
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, code-quality, security, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v3
        with:
          name: ecodrive-build

      - name: Deployment simulation
        run: |
          echo "=== Deployment Process ==="
          echo "Deploying to production environment..."
          echo "Build SHA: ${{ github.sha }}"
          echo "Deployed by: ${{ github.actor }}"
          echo "Timestamp: $(date)"
          
          # Itt lennének a valódi deployment lépések:
          # - SSH kapcsolódás a szerverhez
          # - Fájlok másolása
          # - Adatbázis migráció
          # - Szolgáltatások újraindítása
          # - Health check
          
          echo "Deployment completed successfully!"

      - name: Notify deployment status
        run: |
          echo "✅ Deployment successful!"
          echo "Application version: ${{ github.sha }}"

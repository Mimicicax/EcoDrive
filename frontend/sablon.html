<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoDrive - Bejelentkezés</title>
    <link rel="stylesheet" href="stilus-sablon.css">
</head>
<body>
    <div class="login-container">
        <div class="eco-accent eco-accent-1"></div>
        <div class="eco-accent eco-accent-2"></div>
        
        <div class="logo-container">
            <div class="logo-icon"></div>
            <h1>Bejelentkezés</h1>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Felhasználónév</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="Felhasználónév vagy email"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Jelszó</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Jelszó"
                    required
                >
            </div>

            <div class="forgot-password">
                <a href="#" id="forgotPassword">Elfelejtett jelszó</a>
            </div>

            <div class="button-group">
                <button type="button" class="btn-secondary" id="registerBtn">
                    Még nincs fiókom
                </button>
                <button type="submit" class="btn-primary">
                    Bejelentkezés
                </button>
            </div>
        </form>
    </div>
</body>
</html>
